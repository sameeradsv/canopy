<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Canopy Icon — Final</title>
<style>
  body { background: #888; display: flex; gap: 24px; flex-wrap: wrap; padding: 32px; font-family: sans-serif; align-items: flex-start; }
  .card { background: #555; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; font-size: 10px; }
  .sbar { background: #1a1a1f; border-radius: 6px; padding: 4px 10px; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<div class="card">512 px
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
    <rect width="100" height="100" rx="18" fill="#fdf8f0"/>
    <rect x="44" y="64" width="12" height="22" rx="4" fill="#8a4a08"/>
    <polygon points="50,16 80,64 20,64" fill="#d4831a"/>
    <polygon points="50,28 72,64 50,64" fill="#8a4a08" opacity="0.55"/>
  </svg>
</div>

<div class="card">64 px
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
    <rect width="100" height="100" rx="18" fill="#fdf8f0"/>
    <rect x="44" y="64" width="12" height="22" rx="4" fill="#8a4a08"/>
    <polygon points="50,16 80,64 20,64" fill="#d4831a"/>
    <polygon points="50,28 72,64 50,64" fill="#8a4a08" opacity="0.55"/>
  </svg>
</div>

<div class="card">32 px
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
    <rect width="100" height="100" rx="18" fill="#fdf8f0"/>
    <rect x="44" y="64" width="12" height="22" rx="4" fill="#8a4a08"/>
    <polygon points="50,16 80,64 20,64" fill="#d4831a"/>
    <polygon points="50,28 72,64 50,64" fill="#8a4a08" opacity="0.55"/>
  </svg>
</div>

<div class="card">16 px
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="16" height="16">
    <rect width="100" height="100" rx="18" fill="#fdf8f0"/>
    <rect x="44" y="64" width="12" height="22" rx="4" fill="#8a4a08"/>
    <polygon points="50,16 80,64 20,64" fill="#d4831a"/>
    <polygon points="50,28 72,64 50,64" fill="#8a4a08" opacity="0.55"/>
  </svg>
</div>

<div class="card">Sidebar (dark bg)
  <div class="sbar">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24">
      <rect x="44" y="64" width="12" height="22" rx="4" fill="#8a4a08"/>
      <polygon points="50,16 80,64 20,64" fill="#d4831a"/>
      <polygon points="50,28 72,64 50,64" fill="#8a4a08" opacity="0.55"/>
    </svg>
    <span style="color:#d4831a;font-size:13px;font-style:italic;font-family:Georgia,serif;">Canopy</span>
  </div>
</div>

</body>
</html>
