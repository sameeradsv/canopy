name: Deploy Canopy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FLY_APP_NAME: ${{ vars.FLY_APP_NAME || 'canopy-api' }}

jobs:
  deploy-backend:
    name: Deploy API (Fly.io)
    runs-on: ubuntu-latest
    if: ${{ secrets.FLY_API_TOKEN != '' }}
    outputs:
      api_url: ${{ steps.api-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: API URL
        id: api-url
        run: |
          url="${{ vars.CANOPY_API_URL }}"
          if [ -z "$url" ]; then
            url="https://${{ env.FLY_APP_NAME }}.fly.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build UI for GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: >-
      always() && !cancelled() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-backend.outputs.api_url || vars.CANOPY_API_URL || '' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy-pages:
    name: Deploy UI (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
