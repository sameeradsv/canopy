# Deploy UI (GitHub Pages) after verifying the configured API.
# API compute is deployed separately by Vercel's Git integration.
name: Deploy Canopy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    name: Build UI for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git HTTPS for GitHub packages
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify API health
        run: |
          API="${{ vars.CANOPY_API_URL }}"
          if [ -z "$API" ]; then
            echo "::error::Set repo variable CANOPY_API_URL to the production API base URL, e.g. https://canopy-api.vercel.app"
            exit 1
          fi
          echo "Checking $API/api/health"
          curl -fsS --retry 3 --retry-delay 5 "$API/api/health" || {
            echo "::error::API health check failed for $API"
            exit 1
          }

      - name: Build static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ${{ vars.CANOPY_API_URL }}
          NEXT_PUBLIC_CORTEX_URL: ${{ vars.NEXT_PUBLIC_CORTEX_URL }}
          NEXT_PUBLIC_CIRCUIT_API_URL: ${{ vars.NEXT_PUBLIC_CIRCUIT_API_URL }}
          NEXT_PUBLIC_CHEF_API_URL: ${{ vars.NEXT_PUBLIC_CHEF_API_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy-pages:
    name: Deploy UI (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
