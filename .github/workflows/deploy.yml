# Deploy API (Render) then UI (GitHub Pages) on each push to main.
name: Deploy Canopy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set — use Render Blueprint auto-deploy from render.yaml"
          fi

  build-frontend:
    name: Build UI for GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure git HTTPS for GitHub packages
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify API health
        run: |
          API="${{ vars.CANOPY_API_URL || 'https://canopy-api.onrender.com' }}"
          echo "Checking $API/api/health"
          curl -fsS --retry 3 --retry-delay 5 "$API/api/health" || {
            echo "::error::API health check failed for $API — set repo variable CANOPY_API_URL to your Render service URL"
            exit 1
          }

      - name: Build static site
        working-directory: frontend
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_API_URL: ${{ vars.CANOPY_API_URL || 'https://canopy-api.onrender.com' }}
          NEXT_PUBLIC_CORTEX_URL: ${{ vars.NEXT_PUBLIC_CORTEX_URL }}
          NEXT_PUBLIC_CIRCUIT_API_URL: ${{ vars.NEXT_PUBLIC_CIRCUIT_API_URL }}
          NEXT_PUBLIC_CHEF_API_URL: ${{ vars.NEXT_PUBLIC_CHEF_API_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy-pages:
    name: Deploy UI (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
