# Connect at https://dashboard.render.com → New → Blueprint
# DATABASE_URL must be set manually in the Render dashboard after deploy
# (use a free Neon PostgreSQL: https://neon.tech)
services:
  - type: web
    name: canopy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_REQUIRED
        value: "true"
      - key: CORS_ORIGINS
        value: https://sameeradsv.github.io
      - key: GROQ_API_KEY
        sync: false
      - key: CORTEX_AUTH_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
