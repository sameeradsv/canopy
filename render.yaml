# Connect at https://dashboard.render.com → New → Blueprint
# Free PostgreSQL expires after 90 days on free plan; recreate via Blueprint to reset.
databases:
  - name: canopy-db
    plan: free
    region: oregon

services:
  - type: web
    name: canopy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canopy-db
          property: connectionString
      - key: AUTH_REQUIRED
        value: "true"
      - key: CORS_ORIGINS
        value: https://sameeradsv.github.io,http://localhost:3000,http://127.0.0.1:3000
      - key: PYTHON_VERSION
        value: "3.12"
