# One-time: fly apps create canopy-api
#          fly volumes create canopy_data --region iad --size 1 -a canopy-api
app = "canopy-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////app/data/canopy.db"
  CORS_ORIGINS = "https://sameeradsv.github.io,http://localhost:3000,http://127.0.0.1:3000"
  AUTH_REQUIRED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[mounts]]
  source = "canopy_data"
  destination = "/app/data"
